# Pulse osquery Agent Configuration

server:
  url: "http://localhost:7655"
  api_token: "your-api-token-here"

agent:
  id: ""  # Leave empty to use hostname
  interval: 60s  # Collection interval (e.g., 30s, 1m, 5m)

filter:
  mode: "aggressive"  # none, basic, or aggressive
  exclude_patterns:
    # Add custom patterns here (optional)
    # - "myapp*"
    # - "*test*"

logging:
  debug: false
